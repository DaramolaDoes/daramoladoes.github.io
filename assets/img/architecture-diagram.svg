<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Scientific Platforms Reference Architecture</title>
  <desc id="desc">A dark themed architecture diagram showing scientists and autonomous agents sending requests to an API layer, model serving, governed method execution, versioned outputs, and observability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0C10"/>
      <stop offset="1" stop-color="#11131A"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#171A22"/>
      <stop offset="1" stop-color="#11131A"/>
    </linearGradient>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F0D87A"/>
      <stop offset="1" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F0D87A"/>
      <stop offset="1" stop-color="#8A6A14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L10 6L1 11" stroke="#D4AF37" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.18">
    <circle cx="180" cy="110" r="180" fill="#D4AF37"/>
    <circle cx="1420" cy="110" r="150" fill="#FFFFFF"/>
  </g>

  <text x="80" y="92" fill="#F3EFE6" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="4">SCIENTIFIC PLATFORMS</text>
  <text x="80" y="154" fill="#F3EFE6" font-family="Arial Black, Inter, Arial, sans-serif" font-size="58" font-weight="800">Reference Platform Flow</text>
  <text x="80" y="196" fill="#B8BCC8" font-family="Inter, Arial, sans-serif" font-size="24">A governed path from request to reproducible output, monitoring, and scaled consumption.</text>

  <!-- Left actors -->
  <g filter="url(#shadow)">
    <rect x="80" y="280" rx="28" ry="28" width="250" height="148" fill="url(#panel)" stroke="#2B2F38"/>
    <circle cx="144" cy="344" r="28" fill="#D4AF37" opacity="0.18" stroke="#D4AF37"/>
    <path d="M144 330c10 0 18 8 18 18s-8 18-18 18-18-8-18-18 8-18 18-18Zm0 40c-18 0-32 11-32 24h64c0-13-14-24-32-24Z" fill="#F0D87A"/>
    <text x="190" y="335" fill="#F3EFE6" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Scientist</text>
    <text x="190" y="367" fill="#A9AFBC" font-family="Inter, Arial, sans-serif" font-size="18">Human-guided workflow</text>
    <text x="190" y="394" fill="#A9AFBC" font-family="Inter, Arial, sans-serif" font-size="18">Validated dataset input</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="480" rx="28" ry="28" width="250" height="148" fill="url(#panel)" stroke="#2B2F38"/>
    <circle cx="144" cy="544" r="28" fill="#D4AF37" opacity="0.18" stroke="#D4AF37"/>
    <rect x="129" y="529" width="30" height="30" rx="8" fill="#F0D87A"/>
    <path d="M136 536h16M136 543h16M136 550h10" stroke="#11131A" stroke-width="2.2" stroke-linecap="round"/>
    <text x="190" y="535" fill="#F3EFE6" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Autonomous Agent</text>
    <text x="190" y="567" fill="#A9AFBC" font-family="Inter, Arial, sans-serif" font-size="18">Governed tool call</text>
    <text x="190" y="594" fill="#A9AFBC" font-family="Inter, Arial, sans-serif" font-size="18">Traceable request path</text>
  </g>

  <!-- Central stages -->
  <g filter="url(#shadow)">
    <rect x="430" y="220" rx="30" ry="30" width="300" height="110" fill="url(#panel)" stroke="url(#goldStroke)" stroke-width="1.5"/>
    <text x="470" y="268" fill="#F0D87A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">01</text>
    <text x="470" y="300" fill="#F3EFE6" font-family="Arial Black, Inter, Arial, sans-serif" font-size="34">API Layer</text>
    <text x="470" y="326" fill="#A9AFBC" font-family="Inter, Arial, sans-serif" font-size="18">Stable contracts · schema checks</text>

    <rect x="430" y="390" rx="30" ry="30" width="300" height="110" fill="url(#panel)" stroke="#2B2F38"/>
    <text x="470" y="438" fill="#F0D87A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">02</text>
    <text x="470" y="470" fill="#F3EFE6" font-family="Arial Black, Inter, Arial, sans-serif" font-size="34">Model Serving</text>
    <text x="470" y="496" fill="#A9AFBC" font-family="Inter, Arial, sans-serif" font-size="18">Versioned runtime · policy guardrails</text>

    <rect x="430" y="560" rx="30" ry="30" width="300" height="110" fill="url(#panel)" stroke="#2B2F38"/>
    <text x="470" y="608" fill="#F0D87A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">03</text>
    <text x="470" y="640" fill="#F3EFE6" font-family="Arial Black, Inter, Arial, sans-serif" font-size="34">Method Execution</text>
    <text x="470" y="666" fill="#A9AFBC" font-family="Inter, Arial, sans-serif" font-size="18">Reproducible workflow · governed compute</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="880" y="290" rx="30" ry="30" width="320" height="120" fill="url(#panel)" stroke="#2B2F38"/>
    <text x="920" y="340" fill="#F0D87A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">04</text>
    <text x="920" y="374" fill="#F3EFE6" font-family="Arial Black, Inter, Arial, sans-serif" font-size="34">Versioned Outputs</text>
    <text x="920" y="402" fill="#A9AFBC" font-family="Inter, Arial, sans-serif" font-size="18">Summary · metadata · explanation artifacts</text>

    <rect x="880" y="480" rx="30" ry="30" width="320" height="120" fill="url(#panel)" stroke="#2B2F38"/>
    <text x="920" y="530" fill="#F0D87A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">05</text>
    <text x="920" y="564" fill="#F3EFE6" font-family="Arial Black, Inter, Arial, sans-serif" font-size="34">Observability</text>
    <text x="920" y="592" fill="#A9AFBC" font-family="Inter, Arial, sans-serif" font-size="18">Latency · drift · health · release status</text>
  </g>

  <!-- Right observability panel -->
  <g filter="url(#shadow)">
    <rect x="1270" y="250" rx="30" ry="30" width="250" height="390" fill="url(#panel)" stroke="url(#goldStroke)" stroke-width="1.2"/>
    <text x="1310" y="300" fill="#F3EFE6" font-family="Arial Black, Inter, Arial, sans-serif" font-size="28">Operational View</text>

    <rect x="1310" y="332" width="170" height="1" fill="#2B2F38"/>

    <text x="1310" y="376" fill="#9DA3B2" font-family="Inter, Arial, sans-serif" font-size="16" letter-spacing="1">P95 LATENCY</text>
    <text x="1310" y="414" fill="#F3EFE6" font-family="Arial Black, Inter, Arial, sans-serif" font-size="34">842 ms</text>

    <text x="1310" y="468" fill="#9DA3B2" font-family="Inter, Arial, sans-serif" font-size="16" letter-spacing="1">SUCCESS RATE</text>
    <text x="1310" y="506" fill="#F3EFE6" font-family="Arial Black, Inter, Arial, sans-serif" font-size="34">99.1%</text>

    <text x="1310" y="560" fill="#9DA3B2" font-family="Inter, Arial, sans-serif" font-size="16" letter-spacing="1">INPUT DRIFT</text>
    <text x="1310" y="598" fill="#F3EFE6" font-family="Arial Black, Inter, Arial, sans-serif" font-size="34">Low</text>
  </g>

  <!-- Bars -->
  <g transform="translate(1298 660)">
    <rect x="0" y="0" width="194" height="1" fill="#2B2F38"/>
    <rect x="0" y="-48" width="12" height="48" rx="6" fill="url(#bar)"/>
    <rect x="18" y="-80" width="12" height="80" rx="6" fill="url(#bar)"/>
    <rect x="36" y="-62" width="12" height="62" rx="6" fill="url(#bar)"/>
    <rect x="54" y="-92" width="12" height="92" rx="6" fill="url(#bar)"/>
    <rect x="72" y="-70" width="12" height="70" rx="6" fill="url(#bar)"/>
    <rect x="90" y="-56" width="12" height="56" rx="6" fill="url(#bar)"/>
    <rect x="108" y="-88" width="12" height="88" rx="6" fill="url(#bar)"/>
    <rect x="126" y="-98" width="12" height="98" rx="6" fill="url(#bar)"/>
    <rect x="144" y="-74" width="12" height="74" rx="6" fill="url(#bar)"/>
    <rect x="162" y="-84" width="12" height="84" rx="6" fill="url(#bar)"/>
  </g>

  <!-- Flow arrows -->
  <path d="M330 354 C372 354, 382 280, 430 275" stroke="#D4AF37" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M330 554 C372 554, 382 280, 430 275" stroke="#D4AF37" stroke-width="3" fill="none" opacity="0.75" marker-end="url(#arrow)"/>

  <path d="M580 330 L580 390" stroke="#D4AF37" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M580 500 L580 560" stroke="#D4AF37" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M730 445 C790 445, 805 350, 880 350" stroke="#D4AF37" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M730 615 C790 615, 805 540, 880 540" stroke="#D4AF37" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <path d="M1200 350 C1240 350, 1230 350, 1270 350" stroke="#D4AF37" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M1200 540 C1240 540, 1230 540, 1270 540" stroke="#D4AF37" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Footer annotation -->
  <text x="80" y="824" fill="#9DA3B2" font-family="Inter, Arial, sans-serif" font-size="18">Illustrative architecture: request → serving → governed method execution → outputs → monitoring.</text>
  <text x="80" y="854" fill="#6E7484" font-family="Inter, Arial, sans-serif" font-size="16">Designed to visually match the dark editorial board and roadmap language used on the site.</text>
</svg>
